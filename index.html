<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900">
  <div class="min-h-screen bg-slate-900 p-8 text-slate-100 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700">
      <div class="p-6">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-xl font-bold tracking-tight">玩家：实习工程师</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest">等级 22 · 深圳大区</p>
          </div>
          <div class="h-12 w-12 rounded-full bg-gradient-to-tr from-blue-500 to-emerald-400 flex items-center justify-center text-2xl">
            🤖
          </div>
        </div>

        <div class="space-y-4">
          <div>
            <div class="flex justify-between text-sm mb-1">
              <span class="text-yellow-400 font-medium">💰 金币总额 (CNY)</span>
              <span id="gold-text" class="text-slate-400">7,000 / 15,000</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 border border-slate-600">
              <div id="gold-progress" class="bg-gradient-to-r from-yellow-600 to-yellow-300 h-full rounded-full shadow-[0_0_10px_rgba(250,204,21,0.5)] transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p class="text-[10px] text-slate-500 mt-1 italic">* 达到 15,000 以解锁装备：DJI Pocket 3 / Action 4</p>
          </div>

          <div>
            <div class="flex justify-between text-sm mb-1">
              <span class="text-blue-400 font-medium">⚡ 核心技能：FOC 电机控制</span>
              <span class="text-slate-400">LV.3</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 border border-slate-600">
              <div class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full rounded-full shadow-[0_0_10px_rgba(34,211,238,0.5)]" style="width: 30%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-slate-850 p-6 border-t border-slate-700">
        <h2 class="text-sm font-semibold uppercase text-slate-400 mb-4 tracking-wider">当前任务 (Quests)</h2>
        <ul class="space-y-3">
          <li class="flex items-start gap-3 bg-slate-700/30 p-3 rounded-lg border border-slate-700/50">
            <input type="checkbox" class="mt-1 rounded border-slate-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500">
            <div>
              <p class="text-sm font-medium text-slate-200">完成 CoreXY 激光雕刻机控制系统</p>
              <p class="text-xs text-slate-500">奖励：ESP32 实战经验 +500</p>
            </div>
          </li>
          <li class="flex items-start gap-3 bg-slate-700/30 p-3 rounded-lg border border-slate-700/50">
            <input type="checkbox" class="mt-1 rounded border-slate-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500" checked>
            <div>
              <p class="text-sm font-medium text-slate-400 line-through">深圳实习日常 (Daily)</p>
              <p class="text-xs text-slate-600">奖励：基础金币收益</p>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    // 建议的优化：抽离存款数字
    const goal = 15000;
    let gold = 7000;

    // 更新界面
    function updateDashboard() {
      const goldText = document.getElementById('gold-text');
      const goldProgress = document.getElementById('gold-progress');
      
      // 格式化数字并更新文字
      goldText.innerText = `${gold.toLocaleString()} / ${goal.toLocaleString()}`;
      
      // 计算并更新进度条长度
      const percentage = Math.min((gold / goal) * 100, 100);
      goldProgress.style.width = `${percentage}%`;
    }

    // 初始化显示
    window.onload = updateDashboard;
  </script>
</body>
</html>
