<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900">
  <div class="min-h-screen bg-slate-900 p-8 text-slate-100 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700">
      <div class="p-6">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-xl font-bold tracking-tight">玩家：实习工程师</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest">等级 22 · 深圳大区</p>
          </div>
          <div class="h-12 w-12 rounded-full bg-gradient-to-tr from-blue-500 to-emerald-400 flex items-center justify-center text-2xl">
            🤖
          </div>
        </div>

        <div class="space-y-4">
          <div>
            <div class="flex justify-between text-sm mb-1">
              <span class="text-yellow-400 font-medium">💰 金币总额 (CNY)</span>
              <span id="gold-text" class="text-slate-400">7,000 / 15,000</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 border border-slate-600">
              <div id="gold-progress" class="bg-gradient-to-r from-yellow-600 to-yellow-300 h-full rounded-full shadow-[0_0_10px_rgba(250,204,21,0.5)] transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p class="text-[10px] text-slate-500 mt-1 italic">* 达到 15,000 以解锁装备：DJI Pocket 3 / Action 4</p>
          </div>

          <div>
            <div class="flex justify-between text-sm mb-1">
              <span class="text-blue-400 font-medium">⚡ 核心技能：FOC 电机控制</span>
              <span class="text-slate-400">LV.3</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 border border-slate-600">
              <div class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full rounded-full shadow-[0_0_10px_rgba(34,211,238,0.5)]" style="width: 30%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-slate-850 p-6 border-t border-slate-700">
        <h2 class="text-sm font-semibold uppercase text-slate-400 mb-4 tracking-wider">当前任务 (Quests)</h2>
        <ul class="space-y-3">
          <li class="flex items-start gap-3 bg-slate-700/30 p-3 rounded-lg border border-slate-700/50">
            <input type="checkbox" class="mt-1 rounded border-slate-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500">
            <div>
              <p class="text-sm font-medium text-slate-200">完成 CoreXY 激光雕刻机控制系统</p>
              <p class="text-xs text-slate-500">奖励：ESP32 实战经验 +500</p>
            </div>
          </li>
          <li class="flex items-start gap-3 bg-slate-700/30 p-3 rounded-lg border border-slate-700/50">
            <input type="checkbox" class="mt-1 rounded border-slate-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500" checked>
            <div>
              <p class="text-sm font-medium text-slate-400 line-through">深圳实习日常 (Daily)</p>
              <p class="text-xs text-slate-600">奖励：基础金币收益</p>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 管理面板：隐藏在底部，点击齿轮或长按可显示（这里先做一个简单的显示按钮） -->
  <div class="max-w-md mx-auto mt-4 px-4 pb-12">
    <button onclick="toggleAdmin()" class="text-slate-600 text-xs hover:text-slate-400 transition-colors flex items-center gap-1">
      ⚙️ 管理面板
    </button>
    
    <div id="admin-panel" class="hidden mt-4 p-4 bg-slate-800 rounded-lg border border-slate-700 shadow-xl">
      <h3 class="text-sm font-bold text-slate-300 mb-3">更新金币 (CNY)</h3>
      <div class="flex flex-col gap-2 mb-3">
        <input type="number" id="gold-input" placeholder="输入金额" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-500">
        <div class="flex gap-2">
          <button onclick="addGold()" class="flex-1 bg-yellow-600 hover:bg-yellow-500 py-1.5 rounded text-sm font-bold transition-colors">➕ 增加金额</button>
          <button onclick="setGold()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-1.5 rounded text-sm font-bold transition-colors">🎯 设置总额</button>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="quickAdd(100)" class="flex-1 bg-slate-700 hover:bg-slate-600 py-1 rounded text-xs">+100</button>
        <button onclick="quickAdd(500)" class="flex-1 bg-slate-700 hover:bg-slate-600 py-1 rounded text-xs">+500</button>
        <button onclick="quickAdd(1000)" class="flex-1 bg-slate-700 hover:bg-slate-600 py-1 rounded text-xs">+1000</button>
      </div>
      <p id="sync-status" class="text-[10px] text-slate-500 mt-2 italic text-center">状态：就绪</p>
    </div>
  </div>

  <script>
    // 基础配置
    const goal = 15000;
    // 从本地存储加载，如果没有则默认 7000
    let gold = parseInt(localStorage.getItem('gold')) || 7000;

    // 更新界面
    function updateDashboard() {
      const goldText = document.getElementById('gold-text');
      const goldProgress = document.getElementById('gold-progress');
      
      // 格式化数字并更新文字
      goldText.innerText = `${gold.toLocaleString()} / ${goal.toLocaleString()}`;
      
      // 计算并更新进度条长度
      const percentage = Math.min((gold / goal) * 100, 100);
      goldProgress.style.width = `${percentage}%`;
      
      // 保存到本地存储，防止刷新丢失
      localStorage.setItem('gold', gold);
      
      // 同步到 ESP32 (预留接口)
      syncToESP32(gold);
    }

    // 显示/隐藏管理面板
    function toggleAdmin() {
      const panel = document.getElementById('admin-panel');
      panel.classList.toggle('hidden');
    }

    // 手动增加金币
    function addGold() {
      const input = document.getElementById('gold-input');
      const value = parseInt(input.value);
      if (!isNaN(value)) {
        gold += value;
        input.value = '';
        updateDashboard();
      }
    }

    // 设置固定金额
    function setGold() {
      const input = document.getElementById('gold-input');
      const value = parseInt(input.value);
      if (!isNaN(value)) {
        gold = value;
        input.value = '';
        updateDashboard();
      }
    }

    // 快捷增加
    function quickAdd(amount) {
      gold += amount;
      updateDashboard();
    }

    // ESP32 同步逻辑 (这是一个占位示例)
    async function syncToESP32(newGold) {
      const status = document.getElementById('sync-status');
      status.innerText = '状态：正在同步到 ESP32...';
      
      try {
        // 如果你有一个 ESP32 的 API 地址，可以取消下面注释：
        /*
        await fetch('http://<ESP32_IP>/update?gold=' + newGold, {
          method: 'GET',
          mode: 'no-cors'
        });
        */
        
        // 模拟同步成功
        setTimeout(() => {
          status.innerText = '状态：已同步到 ESP32';
        }, 800);
      } catch (err) {
        status.innerText = '状态：同步失败 (检查连接)';
      }
    }

    // 初始化显示
    window.onload = updateDashboard;
  </script>
</body>
</html>
